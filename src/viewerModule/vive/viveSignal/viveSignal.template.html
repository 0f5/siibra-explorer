<ng-template [ngIf]="ready$ | async">
  <ng-template [ngTemplateOutlet]="viveCtrlTmpl"></ng-template>
</ng-template>


<ng-template #viveCtrlTmpl>

  <mat-card>
    <span> vive tracker status</span>
  </mat-card>

  <mat-card>
    <span *ngIf="connected$ | async as text">
      {{ text }}
    </span>
  </mat-card>


  <mat-card>
    <span *ngIf="currentpos$ | async as text">
      {{ text }}
    </span>
  </mat-card>

  <mat-card>
    <span *ngIf="currentquad$ | async as text">
      {{ text }}
    </span>
  </mat-card>
  
  
</ng-template>
